services:
  mongodb:
    image: mongo:7
    container_name: tamagotchi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: tamagotchi-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/tamagotchi
    depends_on:
      - mongodb
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
    container_name: tamagotchi-frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo_data:
